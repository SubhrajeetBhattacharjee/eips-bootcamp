packages:
  - "apps/*"
  - "packages/*"
  - "contracts"
allowBuilds:
  '@clerk/shared': true
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  bufferutil: set this to true or false
  keccak: set this to true or false
  prisma: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: set this to true or false
